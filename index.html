    <script>
        // Load navbar and footer
        document.addEventListener('DOMContentLoaded', function() {
            loadNavbar('home');
            loadFooter();
            loadHeroSlideshow();
            preloadCarouselImages().then(() => {
                initShowcaseCarousel();
            });
        });

        /**
         * Preload all carousel images into browser cache and decode them
         */
        function preloadCarouselImages() {
            const images = document.querySelectorAll('.carousel-image');
            const preloadPromises = Array.from(images).map(img => {
                return new Promise((resolve) => {
                    const preloadImg = new Image();
                    preloadImg.onload = () => {
                        // Use decode() if available to ensure image is ready to render
                        if (preloadImg.decode) {
                            preloadImg.decode().then(resolve).catch(resolve);
                        } else {
                            resolve();
                        }
                    };
                    preloadImg.onerror = resolve;
                    preloadImg.src = img.src;
                });
            });
            return Promise.all(preloadPromises);
        }

        /**
         * Infinite Loop Carousel - Seamless looping with cloning
         */
        function initShowcaseCarousel() {
            const track = document.getElementById('carouselTrack');
            const originalSlides = Array.from(document.querySelectorAll('.carousel-slide'));
            const container = document.querySelector('.carousel-container');
            
            if (!track || originalSlides.length === 0) return;

            const ORIGINAL_COUNT = originalSlides.length;
            const CLONES_PER_SIDE = 5; // Number of clones on each side for buffer
            const AUTO_PLAY_DELAY = 4000;
            const TRANSITION_DURATION = 800;
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            
            let currentIndex = Math.floor(ORIGINAL_COUNT / 2) + CLONES_PER_SIDE; // Start in middle of originals
            let autoPlayInterval;
            let isTransitioning = false;
            
            // Clone slides for infinite effect
            function setupClones() {
                // Clone last N slides and prepend
                for (let i = CLONES_PER_SIDE - 1; i >= 0; i--) {
                    const idx = (ORIGINAL_COUNT - CLONES_PER_SIDE + i + ORIGINAL_COUNT) % ORIGINAL_COUNT;
                    const clone = originalSlides[idx].cloneNode(true);
                    clone.classList.add('clone');
                    clone.setAttribute('aria-hidden', 'true');
                    track.insertBefore(clone, track.firstChild);
                }
                
                // Clone first N slides and append
                for (let i = 0; i < CLONES_PER_SIDE; i++) {
                    const clone = originalSlides[i % ORIGINAL_COUNT].cloneNode(true);
                    clone.classList.add('clone');
                    clone.setAttribute('aria-hidden', 'true');
                    track.appendChild(clone);
                }
            }
            
            setupClones();
            
            // Get all slides including clones
            let allSlides = Array.from(document.querySelectorAll('.carousel-slide'));
            const TOTAL_SLIDES = allSlides.length;
            
            // Cache slide metrics
            let slideWidths = [];
            let slidePositions = [];
            
            function cacheSlideMetrics() {
                const gap = parseFloat(getComputedStyle(track).gap) || 24;
                slideWidths = allSlides.map(slide => slide.offsetWidth);
                slidePositions = [];
                let position = 0;
                for (let i = 0; i < allSlides.length; i++) {
                    slidePositions.push(position);
                    position += slideWidths[i] + gap;
                }
            }

            function getOffset(index) {
                const containerWidth = container.offsetWidth;
                const slidePosition = slidePositions[index] || 0;
                const targetSlideWidth = slideWidths[index] || allSlides[index].offsetWidth;
                return (containerWidth / 2) - (targetSlideWidth / 2) - slidePosition;
            }

            function updateVisuals(index) {
                allSlides.forEach((slide, i) => {
                    slide.classList.remove('active', 'adjacent');
                    if (i === index) slide.classList.add('active');
                    else if (Math.abs(i - index) === 1) slide.classList.add('adjacent');
                });
            }

            function goToSlide(index, animate = true) {
                currentIndex = index;
                
                if (animate && !prefersReducedMotion) {
                    track.style.transition = `transform ${TRANSITION_DURATION}ms cubic-bezier(0.25, 0.1, 0.25, 1)`;
                } else {
                    track.style.transition = 'none';
                }
                
                track.style.transform = `translateX(${getOffset(index)}px)`;
                updateVisuals(index);
            }

            function checkBounds() {
                // If we've scrolled to a clone, instantly jump to the real slide
                if (currentIndex < CLONES_PER_SIDE) {
                    // Jumped too far left - wrap to end
                    const offset = CLONES_PER_SIDE - currentIndex;
                    currentIndex = TOTAL_SLIDES - CLONES_PER_SIDE - offset;
                    track.style.transition = 'none';
                    track.style.transform = `translateX(${getOffset(currentIndex)}px)`;
                    updateVisuals(currentIndex);
                } else if (currentIndex >= TOTAL_SLIDES - CLONES_PER_SIDE) {
                    // Jumped too far right - wrap to beginning
                    const offset = currentIndex - (TOTAL_SLIDES - CLONES_PER_SIDE);
                    currentIndex = CLONES_PER_SIDE + offset;
                    track.style.transition = 'none';
                    track.style.transform = `translateX(${getOffset(currentIndex)}px)`;
                    updateVisuals(currentIndex);
                }
            }

            function nextSlide() {
                if (isTransitioning) return;
                isTransitioning = true;
                goToSlide(currentIndex + 1);
                
                setTimeout(() => {
                    checkBounds();
                    isTransitioning = false;
                }, TRANSITION_DURATION + 50);
            }

            function prevSlide() {
                if (isTransitioning) return;
                isTransitioning = true;
                goToSlide(currentIndex - 1);
                
                setTimeout(() => {
                    checkBounds();
                    isTransitioning = false;
                }, TRANSITION_DURATION + 50);
            }

            function resetAutoPlay() {
                stopAutoPlay();
                startAutoPlay();
            }

            function startAutoPlay() {
                stopAutoPlay();
                autoPlayInterval = setInterval(nextSlide, AUTO_PLAY_DELAY);
            }

            function stopAutoPlay() {
                if (autoPlayInterval) {
                    clearInterval(autoPlayInterval);
                    autoPlayInterval = null;
                }
            }

            function handleResize() {
                allSlides = Array.from(document.querySelectorAll('.carousel-slide'));
                cacheSlideMetrics();
                track.style.transition = 'none';
                track.style.transform = `translateX(${getOffset(currentIndex)}px)`;
            }

            // Initialize
            cacheSlideMetrics();
            goToSlide(currentIndex, false);
            startAutoPlay();

            // Slide clicks
            allSlides.forEach((slide, index) => {
                slide.addEventListener('click', () => {
                    if (index !== currentIndex && !isTransitioning) {
                        isTransitioning = true;
                        goToSlide(index);
                        resetAutoPlay();
                        setTimeout(() => {
                            checkBounds();
                            isTransitioning = false;
                        }, TRANSITION_DURATION + 50);
                    }
                });
            });

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                const rect = container.getBoundingClientRect();
                const inViewport = rect.top < window.innerHeight && rect.bottom > 0;
                if (!inViewport) return;
                
                if (e.key === 'ArrowRight') {
                    nextSlide();
                    resetAutoPlay();
                } else if (e.key === 'ArrowLeft') {
                    prevSlide();
                    resetAutoPlay();
                }
            });

            // Touch/swipe support
            let touchStartX = 0;
            const SWIPE_THRESHOLD = 50;

            container.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            container.addEventListener('touchend', (e) => {
                const diff = touchStartX - e.changedTouches[0].screenX;
                if (Math.abs(diff) > SWIPE_THRESHOLD) {
                    if (diff > 0) nextSlide();
                    else prevSlide();
                    resetAutoPlay();
                }
            }, { passive: true });

            // Resize handling
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(handleResize, 100);
            });

            // Pause when hidden
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) stopAutoPlay();
                else startAutoPlay();
            });
        }
    </script>
