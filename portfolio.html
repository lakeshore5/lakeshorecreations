        .portfolio-section {
            padding: 4rem 0;
            position: relative;
            z-index: 1;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 1) 100%);
        }
        .portfolio-section-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 600;
            color: var(--gold-color);
            margin-bottom: 2.5rem;
            text-align: center;
            letter-spacing: 0.05em;
        }
        
        /* FLEXBOX LAYOUT - Fixed height, variable width */
        .worlds-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            justify-content: center;
        }
        .world-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            height: 280px;
            border: 1px solid rgba(213, 161, 47, 0.2);
            transition: all 0.4s ease;
        }
        .world-card:hover {
            transform: translateY(-8px);
            border-color: var(--gold-color);
            box-shadow: 0 15px 40px rgba(213, 161, 47, 0.2);
        }
        .world-card img {
            height: 100%;
            width: auto;
            object-fit: cover;
            object-position: top center;
            transition: transform 0.4s ease;
        }
        .world-card:hover img {
            transform: scale(1.05);
        }
        .world-card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem 1.5rem 1.5rem;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.7) 50%, transparent 100%);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(10px);
        }
        .world-card:hover .world-card-overlay {
            opacity: 1;
            transform: translateY(0);
            padding-bottom: 2rem;
        }
        .world-card-title {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--gold-color);
            margin: 0;
            letter-spacing: 0.02em;
        }
        .world-card-count {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0.5rem;
        }
        
        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            overflow-y: auto;
            padding: 2rem;
            box-sizing: border-box;
        }
        .modal-overlay.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .modal-close {
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            font-size: 2.5rem;
            color: var(--gold-color);
            cursor: pointer;
            z-index: 10001;
            transition: all 0.3s ease;
            background: none;
            border: none;
            line-height: 1;
        }
        .modal-close:hover {
            transform: scale(1.2);
            color: #fff;
        }
        .modal-content {
            max-width: 1200px;
            width: 100%;
            padding-top: 3rem;
        }
        .modal-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 600;
            color: var(--gold-color);
            text-align: center;
            margin-bottom: 2.5rem;
            letter-spacing: 0.03em;
        }
        .modal-nav-container {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .modal-main-image {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 12px;
            border: 1px solid rgba(213, 161, 47, 0.3);
        }
        .modal-nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #D5A12F;
            border-radius: 50%;
            color: #D5A12F;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .modal-nav-arrow:hover {
            background: #D5A12F;
            color: #000;
            transform: translateY(-50%) scale(1.1);
        }
        .modal-nav-arrow.prev { left: 20px; }
        .modal-nav-arrow.next { right: 20px; }
        .modal-image-counter {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }
        .modal-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }
        .modal-gallery-item {
            aspect-ratio: 16/10;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .modal-gallery-item:hover,
        .modal-gallery-item.active {
            border-color: var(--gold-color);
            transform: scale(1.02);
        }
        .modal-gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
        }
        
        /* Organics - Fixed height, variable width */
        .organics-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
            justify-content: center;
        }
        .organic-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            height: 250px;
            border: 1px solid rgba(213, 161, 47, 0.2);
            transition: all 0.4s ease;
        }
        .organic-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold-color);
            box-shadow: 0 10px 30px rgba(213, 161, 47, 0.15);
        }
        .organic-card img {

            object-position: top center;

        }
        .organic-card:hover img {

        }
        .organic-card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 1rem 1rem;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, transparent 100%);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }
        .organic-card:hover .organic-card-overlay {
            opacity: 1;
            transform: translateY(0);
        }
        .organic-card-title {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--gold-color);
            margin: 0;
        }
        
        /* Misc - Fixed height, variable width */
        .misc-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
            justify-content: center;
        }
        .misc-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            height: 220px;
            border: 1px solid rgba(213, 161, 47, 0.15);

        .misc-card:hover {

        }
        .misc-card img {
            height: 100%;
            width: auto;
            object-fit: cover;
            object-position: top center;
            transition: transform 0.4s ease;
        }
        .misc-card:hover img {
            transform: scale(1.05);
        }
        .misc-card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 1rem 1rem;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, transparent 100%);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }
        .misc-card:hover .misc-card-overlay {
            opacity: 1;
            transform: translateY(0);
        }
        .misc-card-title {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 500;
            color: var(--gold-color);
            margin: 0;
        }
        
        @media screen and (max-width: 768px) {
            .worlds-grid, .organics-grid, .misc-grid {
                flex-direction: column;
                align-items: center;
            }
            .world-card, .organic-card, .misc-card {
                width: 100%;
                max-width: 400px;
            }
            .world-card img, .organic-card img, .misc-card img {
                width: 100%;
                height: 100%;
            }
            .modal-gallery {
                grid-template-columns: repeat(2, 1fr);
            }
            .modal-close {
                top: 1rem;
                right: 1rem;
                font-size: 2rem;
            }
            .modal-nav-arrow {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
            .modal-nav-arrow.prev { left: 10px; }
            .modal-nav-arrow.next { right: 10px; }
        }
    </style>
</head>

                worldsGrid.appendChild(card);
            });

            const organicsGrid = document.getElementById('organicsGrid');
            organics.forEach((organic) => {
                const card = document.createElement('div');
                card.className = 'organic-card';
                card.innerHTML = '<img src="builds/' + organic.folder + '/' + organic.image + '" alt="' + organic.name + '" loading="lazy"><div class="organic-card-overlay"><h3 class="organic-card-title">' + organic.name + '</h3></div>';
                card.addEventListener('click', () => openModal(organic.name, organic.folder, organic.image));
                organicsGrid.appendChild(card);
            });

            const miscGrid = document.getElementById('miscGrid');
            miscBuilds.forEach((build) => {
                const card = document.createElement('div');
                card.className = 'misc-card';
                card.innerHTML = '<img src="builds/' + build.folder + '/' + build.image + '" alt="' + build.name + '" loading="lazy"><div class="misc-card-overlay"><h3 class="misc-card-title">' + build.name + '</h3></div>';
                card.addEventListener('click', () => openModal(build.name, build.folder, build.image));
                miscGrid.appendChild(card);
            });

            const modal = document.getElementById('worldModal');
            const modalClose = document.getElementById('modalClose');
            const modalTitle = document.getElementById('modalTitle');
            const modalMainImage = document.getElementById('modalMainImage');
            const modalGallery = document.getElementById('modalGallery');
            const modalPrev = document.getElementById('modalPrev');
            const modalNext = document.getElementById('modalNext');
            const modalCounter = document.getElementById('modalCounter');

            let currentImages = [];
            let currentFolder = '';
            let currentIndex = 0;

            function updateArrows() {
                const hasMultiple = currentImages.length > 1;
                if (!hasMultiple) {
                    modalPrev.style.display = 'none';
                    modalNext.style.display = 'none';
                    modalCounter.textContent = '';
                    return;
                }
                modalCounter.textContent = (currentIndex + 1) + ' / ' + currentImages.length;
                modalPrev.style.display = currentIndex === 0 ? 'none' : 'flex';
                modalNext.style.display = currentIndex === currentImages.length - 1 ? 'none' : 'flex';
            }

            function showImage(index) {
                currentIndex = index;
                modalMainImage.src = 'builds/' + currentFolder + '/' + currentImages[index];
                document.querySelectorAll('.modal-gallery-item').forEach((el, i) => {
                    el.classList.toggle('active', i === index);
                });
                updateArrows();
            }

            function openWorldModal(world) {
                currentImages = world.images;
                currentFolder = world.folder;
                currentIndex = 0;
                modalTitle.textContent = world.name;
                modalMainImage.src = 'builds/' + world.folder + '/' + world.mainImage;
                modalMainImage.alt = world.name;
                modalGallery.innerHTML = '';
                world.images.forEach((img, index) => {
                    const item = document.createElement('div');
                    item.className = 'modal-gallery-item' + (index === 0 ? ' active' : '');
                    item.innerHTML = '<img src="builds/' + world.folder + '/' + img + '" alt="' + world.name + ' view ' + (index + 1) + '" loading="lazy">';
                    item.addEventListener('click', () => showImage(index));
                    modalGallery.appendChild(item);
                });
                updateArrows();
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function openModal(name, folder, image) {
                currentImages = [image];
                currentFolder = folder;
                currentIndex = 0;
                modalTitle.textContent = name;
                modalMainImage.src = 'builds/' + folder + '/' + image;
                modalMainImage.alt = name;
                modalGallery.innerHTML = '';
                updateArrows();
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            modalPrev.addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentIndex > 0) showImage(currentIndex - 1);
            });

            modalNext.addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentIndex < currentImages.length - 1) showImage(currentIndex + 1);
            });

            function closeModal() {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }

            modalClose.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
                if (modal.classList.contains('active')) {
                    if (e.key === 'ArrowLeft' && currentIndex > 0) showImage(currentIndex - 1);
                    if (e.key === 'ArrowRight' && currentIndex < currentImages.length - 1) showImage(currentIndex + 1);
                }
            });
        }
    </script>
</body>
</html>
